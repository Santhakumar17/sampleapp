name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Start SSH Agent
      uses: webfactory/ssh-agent@v0.5.3
      with:
        ssh-private-key: ${{ secrets.EC2_PRIVATE_KEY }}

    - name: Deploy to EC2
      env:
        EC2_HOST: "your-ec2-public-ip"
        USER: "ubuntu"
      run: |
        ssh -o StrictHostKeyChecking=no $USER@$EC2_HOST "cd /home/ubuntu/sampleapp && git pull && docker-compose up -d"
